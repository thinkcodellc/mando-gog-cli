# Railway configuration for gogcli (Google Workspace CLI) service
[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
name = "gogcli"

# Health check configuration
healthcheckPath = "/health"
healthcheckTimeout = 10

# Environment variables
[env]
PORT = "8080"
GOG_KEYRING_BACKEND = "file"
GOG_ACCOUNT = "jari.edo@gmail.com"

# Volume mount for persistent credentials (configure in Railway dashboard)
# Mount Path: /root/.config/gogcli

# Service configuration
[service]
port = 8080
memory = 512
cpu = 1000